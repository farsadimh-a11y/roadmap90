<style>
:root{
  --bg:#000000;--s1:#1C1C1E;--s2:#2C2C2E;--tx:#FFFFFF;--sub:#8E8E93;--ft:#636366;--bd:#38383A;
  --a1:#0A84FF;--a2:#FF9F0A;--a3:#30D158;--a4:#BF5AF2;--a5:#64D2FF;--a6:#FF375F;--a7:#FFD60A;--a8:#5E5CE6;
  --green:#30D158;--yellow:#FF9F0A;--red:#FF453A;--on-a1:#FFFFFF;
}
[data-theme=light]{
  --bg:#F2F2F7;--s1:#FFFFFF;--s2:#EBEBF0;--tx:#000000;--sub:#6D6D72;--ft:#AEAEB2;--bd:#E3E3E8;
  --a1:#0066CC;--a2:#C25E00;--a3:#248A3D;--a4:#8944AB;--a5:#00729B;--a6:#D30F45;--a7:#9A7D00;--a8:#5352C9;
  --green:#248A3D;--yellow:#B25000;--red:#D70015;--on-a1:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  color:var(--tx);font-size:15px;line-height:1.45;
  min-height:100dvh;max-width:480px;margin:0 auto;font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased}
.frx{font-family:inherit;letter-spacing:-.02em}
main{padding:0 0 96px}
.view{display:none;animation:fadein .18s ease}
.view.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h1{font-family:inherit;font-size:28px;font-weight:700;line-height:1.1;letter-spacing:-.4px}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 18px 10px}
.sub{color:var(--sub);font-size:12.5px}
.faint{color:var(--ft);font-size:11.5px}
.seclbl{color:var(--sub);font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin:16px 18px 8px}
.focus{margin:12px 16px;padding:14px 16px;border-radius:14px;
  background:color-mix(in srgb,var(--ac) 11%,var(--s1));display:flex;align-items:center;gap:10px}
.focus .lbl{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--ac)}
.focus .txt{font-size:14.5px;margin-top:2px}
.tk{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s1);border-radius:13px;
  margin:0 16px 8px;min-height:56px;position:relative;touch-action:pan-y;transition:transform .15s ease;cursor:pointer}
.tk.od{border:1px solid color-mix(in srgb,var(--red) 45%,var(--bd))}
.dot{width:28px;height:28px;min-width:28px;border-radius:99px;border:2px solid var(--ft);background:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;position:relative}
.dot::after{content:'';position:absolute;inset:-10px}
.dot.doing{border-color:var(--ac);color:var(--ac)}
.dot.done{border-color:var(--ac);background:var(--ac);color:var(--bg)}
.dot svg{width:15px;height:15px;stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.dot.done svg{stroke:var(--bg)}
.anim .dot.done{animation:pop .38s cubic-bezier(.3,1.6,.5,1)}
.anim .dot.done svg path{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s .1s ease forwards}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes draw{to{stroke-dashoffset:0}}
.tk .bd{flex:1;min-width:0}
.tk .tt{font-size:14.5px}
.tk.isdone .tt{color:var(--sub);text-decoration:line-through}
.tk .mt{font-size:11.5px;margin-top:1px;color:var(--sub)}
.tk .ic{color:var(--ft);display:flex;gap:8px}
.tk .ic svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--s1);border-radius:14px;margin:0 16px 10px;padding:14px 16px;cursor:pointer}
.bar{height:6px;border-radius:99px;background:var(--s2);margin-top:9px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:var(--ac);transition:width .6s cubic-bezier(.25,.9,.3,1)}

<script>
'use strict';
const KEY='roadmap90.v1';
const DAY=86400000;
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WD=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT={1:'TechnoGold',2:'English',3:'Trading',4:'App',5:'Leadership'};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const p=s=>{const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c)};
const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const today=()=>iso(new Date());
const JMD=new Intl.DateTimeFormat('en-GB-u-ca-persian',{day:'numeric',month:'long'});
const JY=new Intl.DateTimeFormat('en-GB-u-ca-persian',{year:'numeric'});
const jyear=d=>JY.format(d).replace(/\s*AP\s*/i,'');
const fmtD=s=>JMD.format(p(s));
const fmtG=s=>{const d=p(s);return MO[d.getMonth()]+' '+d.getDate()};
const fmtH=h=>{if(h==null)return'';const m=Math.round(h*60);return m<60?m+'m':(+(h.toFixed(2)))+'h'};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const el=q=>document.querySelector(q);

const SEED={
 period:{start:'2026-07-12',end:'2026-10-10'},
 domains:[
  {id:1,name:'TechnoGold (CEO)',hours:15,goal:'17B toman EBIT run-rate by Oct 10, tracked weekly on driver-tree scorecard',
   milestones:[{due:'2026-08-10',text:'EBIT driver tree + scorecard live; weekly review running; marketing owns traffic/conversion'},
   {due:'2026-09-10',text:'4+ weeks review data; EBIT gap cut 40%+; funnel validated'},
   {due:'2026-10-10',text:'EBIT run-rate at target; board update presented'}],
   kpis:[{n:'EBIT run-rate',t:17,u:'B toman',dir:'up',h:[]}]},
  {id:2,name:'English Writing',hours:3.5,goal:'Error rate cut 50%+ to max 2 errors per 100 words; top-3 error types eliminated',
   milestones:[{due:'2026-08-10',text:'Baseline measured; top-5 errors logged; 5 days/week writing habit'},
   {due:'2026-09-10',text:'Error rate down 30%; 20+ texts corrected'},
   {due:'2026-10-10',text:'Max 2 errors/100 words; 1-page doc needs max 3 corrections'}],
   kpis:[{n:'Errors per 100 words',t:2,u:'',dir:'down',h:[]}]},
  {id:3,name:'Trading & Macro',hours:2.5,goal:'30h structured study with notes per module + Trading Plan v0.1; no real money',
   milestones:[{due:'2026-08-10',text:'Curriculum chosen; 9h done; options fundamentals'},
   {due:'2026-09-10',text:'20h done; options strategies + macro basics'},
   {due:'2026-10-10',text:'30h done; Trading Plan v0.1 written'}],
   kpis:[{n:'Study hours done',t:30,u:'h',dir:'up',h:[]}]},
  {id:4,name:'Personal App',hours:3,goal:'MVP live by Sep 10; 20+ users; 10+ feedback entries; continue/pivot/kill memo',
   milestones:[{due:'2026-08-10',text:'Scope frozen to 1 core feature; 1-page spec; AI prototype'},
   {due:'2026-09-10',text:'MVP live; 5-10 test users onboarded'},
   {due:'2026-10-10',text:'20+ users; feedback log; decision memo'}],
   kpis:[{n:'Active test users',t:20,u:'',dir:'up',h:[]}]},
  {id:5,name:'Leadership',hours:1,goal:'6+ SBI difficult conversations; all meetings agenda+owners; 2 stakeholder presentations',
   milestones:[{due:'2026-08-10',text:'SBI learned; EBIT review as practice ground; 2 hard conversations'},
   {due:'2026-09-10',text:'4+ conversations; presentation #1 delivered'},
   {due:'2026-10-10',text:'6+ conversations; EBIT board update presented'}],
   kpis:[{n:'SBI conversations held',t:6,u:'',dir:'up',h:[]}]}],
 tasks:[
  [1,'Build EBIT driver tree + scorecard with baselines',3,'2026-07-16'],
  [1,'Meet marketing: 2 weekly input metrics + weekly check-in',1,'2026-07-17'],
  [1,'Calendar: weekly EBIT review + 2 deep-work blocks',0.5,'2026-07-14'],
  [2,'Write baseline piece: 1-page update in English',0.75,'2026-07-16'],
  [2,'Run English review with Claude',0.5,'2026-07-17'],
  [2,'Calendar: daily 20-min writing slot',0.2,'2026-07-14'],
  [3,'Choose curriculum (Yale macro + CME/Option Alpha options)',1,'2026-07-19'],
  [3,'Calendar: two 75-min study blocks',0.2,'2026-07-14'],
  [3,'Finish module 1 + half-page note',1.5,'2026-07-19'],
  [4,'Write 1-page spec: user / problem / ONE core action',1.5,'2026-07-16'],
  [4,'First AI build session: core flow prototype',1.5,'2026-07-18'],
  [4,'List 10 target-user people (future testers)',0.3,'2026-07-19'],
  [5,'Prep + hold longest-avoided difficult conversation (SBI)',0.75,'2026-07-18'],
  [5,'Agenda template for EBIT review; run first meeting',0.5,'2026-07-17']],
 repeats:[
  [2,'20-min English writing',0.33,'2026-07-13','daily'],
  [3,'75-min study block',1.25,'2026-07-14','weekly'],
  [3,'75-min study block',1.25,'2026-07-16','weekly'],
  [1,'Weekly EBIT review',1,'2026-07-18','weekly']]
};

let S=null,curView='today',curDom=null,swiped=false;

function seed(){
 const t={version:1,period:SEED.period,
  settings:{theme:'dark',lastExport:null,focus:null},
  domains:SEED.domains,logs:[],
  tasks:SEED.tasks.map(x=>({id:uid(),domain:x[0],text:x[1],est:x[2],due:x[3],notes:'',status:'todo',
    doneAt:null,actual:null,repeat:null,templateId:null,remind:null,notified:false,createdAt:Date.now()}))
    .concat(SEED.repeats.map(x=>({id:uid(),domain:x[0],text:x[1],est:x[2],due:x[3],notes:'',status:'todo',
    doneAt:null,actual:null,repeat:x[4],templateId:null,remind:null,notified:false,createdAt:Date.now()})))};
 return t;
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function load(){
 try{S=JSON.parse(localStorage.getItem(KEY))}catch(e){S=null}
 if(!S||!Array.isArray(S.tasks))S=seed();
 if(!S.settings)S.settings={theme:'dark',lastExport:null,focus:null};
 migrate();ensureInstances();save();applyTheme();
}
function migrate(){
 if(S.settings.dayCap==null)S.settings.dayCap=3;
 if(S.settings.focusMin==null)S.settings.focusMin=25;
 if(S.settings.breakMin==null)S.settings.breakMin=5;
 if(!Array.isArray(S.reviews))S.reviews=[];
 S.domains.forEach(d=>{
  if(!d.kpis){const sd=SEED.domains.find(s=>s.id===d.id&&s.name===d.name);
   d.kpis=sd&&sd.kpis?JSON.parse(JSON.stringify(sd.kpis)):[]}});
}
function applyTheme(){document.documentElement.dataset.theme=S.settings.theme==='light'?'light':'dark';
 const m=document.querySelector('meta[name=theme-color]');if(m)m.content=S.settings.theme==='light'?'#F2F2F7':'#000000'}

function ensureInstances(){
 const t=today(),dow=new Date().getDay();
 S.tasks.filter(x=>x.repeat).forEach(tp=>{
  let match=false;
  if(tp.due&&t<tp.due)return;
  if(tp.repeat==='daily')match=true;
  else if(tp.repeat==='workdays')match=(dow!==4&&dow!==5);
  else if(tp.repeat==='weekly')match=(p(tp.due).getDay()===dow);
  if(match&&!S.tasks.some(x=>x.templateId===tp.id&&x.due===t)){
   S.tasks.push({id:uid(),domain:tp.domain,text:tp.text,est:tp.est,due:t,notes:tp.notes||'',status:'todo',
    doneAt:null,actual:null,repeat:null,templateId:tp.id,remind:null,notified:false,createdAt:Date.now()});
  }
 });
}
const real=()=>S.tasks.filter(x=>!x.repeat);
const dom=id=>S.domains.find(d=>d.id===id);
const acc=d=>d.color||((d.id-1)%8+1);
const accT=id=>{const d=dom(id);return d?acc(d):1};
const shortName=id=>{const d=dom(id);if(!d)return'';return d.short||SHORT[d.id]||d.name.split(/[\s(]/)[0]};
const byDue=(a,b)=>a.due<b.due?-1:a.due>b.due?1:a.createdAt-b.createdAt;

function relTime(ms){const s=Math.round((Date.now()-ms)/1000);
 if(s<90)return'just now';const m=Math.round(s/60);if(m<60)return m+'m ago';
 const h=Math.round(m/60);if(h<24)return h+'h ago';const d=Math.round(h/24);return d+' day'+(d>1?'s':'')+' ago'}
function daysLeft(){return Math.max(0,Math.round((p(S.period.end)-p(today()))/DAY))}
function weekNum(){return Math.min(13,Math.max(1,Math.floor((p(today())-p(S.period.start))/DAY/7)+1))}
function progress(did){const tk=real().filter(x=>x.domain===did);if(!tk.length)return 0;
 return Math.round(tk.filter(x=>x.status==='done').length/tk.length*100)}
function curMilestone(d){if(!d.milestones||!d.milestones.length)return null;
 const t=today();return d.milestones.find(m=>m.due>=t)||d.milestones[d.milestones.length-1]}
function kpiDiff(d){
 // worst KPI progress vs elapsed time over the 90-day period; needs >=2 readings (baseline + latest)
 if(!d.kpis||!d.kpis.length)return null;
 const t0=p(S.period.start),t1=p(S.period.end);
 const timePct=Math.min(1,Math.max(0,(p(today())-t0)/Math.max(1,t1-t0)));
 let worst=null;
 d.kpis.forEach(k=>{
  if(!k.h||k.h.length<2||k.t==null)return;
  const base=k.h[0].v,last=k.h[k.h.length-1].v;
  const den=k.dir==='down'?base-k.t:k.t-base;
  if(!(den>0))return;
  const prog=(k.dir==='down'?base-last:last-base)/den;
  const diff=prog-timePct;
  if(worst===null||diff<worst)worst=diff;
 });
 return worst;
}
function ryg(d){
 let diff=null;
 if(d.milestones&&d.milestones.length){
  const t=today(),ms=d.milestones,cur=curMilestone(d),i=ms.indexOf(cur);
  const start=i>0?ms[i-1].due:S.period.start;
  const span=Math.max(1,p(cur.due)-p(start));
  const timePct=Math.min(1,Math.max(0,(p(t)-p(start))/span));
  const tk=real().filter(x=>x.domain===d.id&&x.due>=start&&x.due<=cur.due);
  if(tk.length)diff=tk.filter(x=>x.status==='done').length/tk.length-timePct;
 }
 const kd=kpiDiff(d);
 if(kd!==null)diff=diff===null?kd:Math.min(diff,kd);
 if(diff===null)return'g';
 return diff>=-0.10?'g':diff>=-0.25?'y':'r';
}
function weekRange(){const n=new Date();const off=(n.getDay()+1)%7;
 const s=new Date(n.getFullYear(),n.getMonth(),n.getDate()-off);
 return[iso(s),iso(new Date(s.getTime()+6*DAY))]}
function weekData(){
 const[ws,we]=weekRange();
 const rows=S.domains.map(d=>{
  const tk=real().filter(x=>x.domain===d.id);
  const planned=tk.filter(x=>x.due>=ws&&x.due<=we).length;
  const doneW=tk.filter(x=>x.status==='done'&&x.doneAt&&iso(new Date(x.doneAt))>=ws&&iso(new Date(x.doneAt))<=we);

function prayerTimes(d){
 // Tehran · Institute of Geophysics, University of Tehran angles (Fajr 17.7°, Maghrib 4.5°) · fixed UTC+3:30
 const lat=35.6892,lng=51.389,tz=3.5,rd=Math.PI/180;
 const fixA=a=>((a%360)+360)%360,fixH=a=>((a%24)+24)%24;
 let y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
 if(m<=2){y--;m+=12}
 const A=Math.floor(y/100);
 const jd=Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+dd+(2-A+Math.floor(A/4))-1524.5-lng/(15*24);
 const sun=t=>{const D=jd+t/24-2451545;
  const g=fixA(357.529+0.98560028*D)*rd,q=fixA(280.459+0.98564736*D);
  const L=fixA(q+1.915*Math.sin(g)+0.02*Math.sin(2*g))*rd;
  const e=(23.439-0.00000036*D)*rd;
  const RA=fixH(Math.atan2(Math.cos(e)*Math.sin(L),Math.cos(L))/rd/15);
  return{dec:Math.asin(Math.sin(e)*Math.sin(L)),eqt:q/15-RA}};
 const noonAt=t=>fixH(12-sun(t).eqt);
 const angleT=(ang,t,dir)=>{const s=sun(t),n=noonAt(t);
  const c=(-Math.sin(ang*rd)-Math.sin(s.dec)*Math.sin(lat*rd))/(Math.cos(s.dec)*Math.cos(lat*rd));
  const h=Math.acos(Math.min(1,Math.max(-1,c)))/rd/15;
  return n+dir*h};
 const raw={fajr:angleT(17.7,5,-1),sunrise:angleT(0.833,6,-1),dhuhr:noonAt(12),
  sunset:angleT(0.833,18,1),maghrib:angleT(4.5,18,1)};
 const out={};for(const k in raw)out[k]=fixH(raw[k]+tz-lng/15);
 return out;
}
function fmtT(v){let h=Math.floor(v),m=Math.round((v-h)*60);if(m===60){h++;m=0}
 return h+':'+String(m).padStart(2,'0')}
function azanHTML(n){

 const items=[['Fajr',pt.fajr],['Sunrise',pt.sunrise],['Dhuhr',pt.dhuhr],['Sunset',pt.sunset],['Maghrib',pt.maghrib]];
 let nx=items.findIndex(i=>i[1]>nowH);
 return'<div class="azan">'+items.map((i,ix)=>'<div class="az'+(ix===nx?' nx':'')+'">'+
  '<div class="al">'+i[0]+'</div><div class="at">'+fmtT(i[1])+'</div></div>').join('')+'</div>';
}

function meetingHoursToday(){
 if(!gEvents)return 0;const t=today();let sum=0;
 gEvents.forEach(ev=>{
  if(!ev.start||!ev.start.dateTime||!ev.end||!ev.end.dateTime)return;
  if(ev.start.dateTime.slice(0,10)!==t)return;
  if(ev.eventType&&(ev.eventType==='outOfOffice'||ev.eventType==='workingLocation'))return;
  if(ev.transparency==='transparent')return; // "free" events don't consume capacity
  const ms=new Date(ev.end.dateTime)-new Date(ev.start.dateTime);

 });

}

function loadGsi(cb){
 if(window.google&&window.google.accounts){cb();return}
 const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
 s.onload=cb;s.onerror=()=>{gBusy=false;toast('Could not load Google sign-in — check internet');renderCal()};
 document.head.appendChild(s);
}
function gAuth(cb){
 const t=gtok();if(t){cb(t);return}
 if(!S.settings.gclientId){gBusy=false;toast('Set your Google Client ID first');renderCal();return}
 loadGsi(()=>{
  const tc=google.accounts.oauth2.initTokenClient({
   client_id:S.settings.gclientId,
   scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.file',
   callback:r=>{
    if(r&&r.access_token){
     localStorage.setItem('r90.gtok',JSON.stringify({t:r.access_token,exp:Date.now()+(((+r.expires_in)||3600)-60)*1000}));
     cb(r.access_token);
    }else{gBusy=false;toast('Sign-in failed');renderCal()}
   },
   error_callback:()=>{gBusy=false;toast('Sign-in cancelled');renderCal()}
  });
  tc.requestAccessToken();
 });
}
async function gcal(path,opts,tok){
 const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events'+path,
  Object.assign({headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'}},opts||{}));
 if(r.status===401){localStorage.removeItem('r90.gtok');throw new Error('auth')}
 if(!r.ok)throw new Error('Google error '+r.status);
 return r.status===204?null:r.json();
}
function loadEvents(){
 if(gBusy)return;gBusy=true;renderCal();
 gAuth(async tok=>{
  try{
   const now=Date.now();
   const q='?singleEvents=true&orderBy=startTime&maxResults=120'+
    '&timeMin='+encodeURIComponent(new Date(now-DAY).toISOString())+
    '&timeMax='+encodeURIComponent(new Date(now+60*DAY).toISOString());
   const j=await gcal(q,null,tok);
   gEvents=j.items||[];
  }catch(e){toast(e.message==='auth'?'Session expired — sign in again':'Could not load events')}
  gBusy=false;render();
 });
}

  if(!e){const hm=s.split(':');e=String(Math.min(23,+hm[0]+1)).padStart(2,'0')+':'+hm[1]}
  body.start={dateTime:d+'T'+s+':00',timeZone:'Asia/Tehran'};

 }else{body.start={date:d};body.end={date:iso(new Date(p(d).getTime()+DAY))}}
 gAuth(async tok=>{
  try{
   await gcal(id?'/'+encodeURIComponent(id):'',{method:id?'PATCH':'POST',body:JSON.stringify(body)},tok);
   closeSheet();toast(id?'Event updated':'Event added');loadEvents();
  }catch(err){toast(err.message==='auth'?'Session expired — sign in again':'Save failed')}
 });

function evDel(id){
 if(!confirm('Delete this event from Google Calendar?'))return;
 gAuth(async tok=>{
  try{
   await gcal('/'+encodeURIComponent(id),{method:'DELETE'},tok);
   closeSheet();toast('Event deleted');loadEvents();
  }catch(err){toast(err.message==='auth'?'Session expired — sign in again':'Delete failed')}
 });
}

// ---- Pomodoro / focus timer ----
let T=null,tTick=null;
function tCfg(){return{f:Math.max(1,S.settings.focusMin||25),b:Math.max(1,S.settings.breakMin||5)}}
function tPersist(){try{localStorage.setItem('r90.timer',T?JSON.stringify(T):'')}catch(e){}}
function tRestore(){try{const o=JSON.parse(localStorage.getItem('r90.timer'));if(o&&o.mode){T=o;
 if(tRemain()<=0){tAccrue();logFocus();T=null;tPersist()}else{ensureTick();renderTimerBar()}}}catch(e){}}
function tRemain(){if(!T)return 0;return T.running?Math.max(0,T.endsAt-Date.now()):(T.pausedRemain||0)}
function fmtClock(ms){const s=Math.max(0,Math.round(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function tAccrue(){if(T&&T.running&&T.mode==='focus'){const n=Date.now();T.focusedMs+=n-T.lastStart;T.lastStart=n}}
function logFocus(){if(!T)return;const mins=(T.focusedMs||0)/60000;T.focusedMs=0;
 if(T.taskId&&mins>=1){const x=S.tasks.find(k=>k.id===T.taskId);
  if(x){x.actual=+(((x.actual||0)+mins/60).toFixed(2));save();toast(Math.round(mins)+'m logged to '+shortName(x.domain))}}}
function startTimer(taskId,mode){
 if(typeof Notification!=='undefined'&&Notification.permission==='default')try{Notification.requestPermission()}catch(e){}
 const c=tCfg(),mins=mode==='break'?c.b:c.f;
 T={taskId:taskId||null,mode:mode||'focus',endsAt:Date.now()+mins*60000,running:true,pausedRemain:0,
  pomos:(T&&T.pomos)||0,focusedMs:(T&&T.focusedMs)||0,lastStart:Date.now()};
 tPersist();ensureTick();renderTimerBar();}
function ensureTick(){if(tTick)return;tTick=setInterval(()=>{
 if(!T){clearInterval(tTick);tTick=null;return}
 if(T.running&&tRemain()<=0)timerPhaseEnd();else tickUI();},1000);}
function tickUI(){const r=tRemain(),c=el('#tclock');if(c)c.textContent=fmtClock(r);
 const b=el('#tbtime');if(b)b.textContent=fmtClock(r);}
function timerPhaseEnd(){tAccrue();beep();
 if(T.mode==='focus'){T.pomos=(T.pomos||0)+1;logFocus();notify('Focus done ✓','Time for a '+tCfg().b+'-min break');startTimer(T.taskId,'break');}
 else{notify('Break over','Ready for the next focus block?');T=null;tPersist();renderTimerBar();}
 if(el('#sheet').classList.contains('on'))openTimerSheet(T?T.taskId:null);}
function pauseTimer(){if(!T||!T.running)return;tAccrue();T.pausedRemain=tRemain();T.running=false;tPersist();renderTimerBar();if(el('#sheet').classList.contains('on'))openTimerSheet();}
function resumeTimer(){if(!T||T.running)return;T.endsAt=Date.now()+(T.pausedRemain||0);T.running=true;T.lastStart=Date.now();tPersist();renderTimerBar();if(el('#sheet').classList.contains('on'))openTimerSheet();}
function skipPhase(){if(!T)return;tAccrue();if(T.mode==='focus')logFocus();startTimer(T.taskId,T.mode==='focus'?'break':'focus');if(el('#sheet').classList.contains('on'))openTimerSheet();}
function stopTimer(){if(!T)return;tAccrue();logFocus();T=null;tPersist();renderTimerBar();if(el('#sheet').classList.contains('on'))closeSheet();toast('Timer stopped');}
function renderTimerBar(){const bar=el('#tbar');
 if(!T){bar.className='';bar.innerHTML='';fabVis();return}
 const x=T.taskId&&S.tasks.find(k=>k.id===T.taskId);
 bar.className='on'+(T.mode==='break'?' brk':'');
 bar.dataset.act='opentimer';
 bar.innerHTML='<span class="tbt" id="tbtime">'+fmtClock(tRemain())+'</span>'+
  '<span class="tbl">'+(T.running?'':'⏸ ')+(T.mode==='break'?'Break':'Focus')+(x?' · '+esc(x.text):'')+'</span>'+
  '<button class="tbx" data-act="tstop">Stop</button>';
 fabVis();}
function beep(){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const a=new A();
 [880,660].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
  o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime+i*0.28);g.gain.exponentialRampToValueAtTime(0.18,a.currentTime+i*0.28+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+i*0.28+0.26);o.start(a.currentTime+i*0.28);o.stop(a.currentTime+i*0.28+0.27)});}catch(e){}}
function notify(t,b){if(typeof Notification!=='undefined'&&Notification.permission==='granted'){try{new Notification(t,{body:b})}catch(e){}}}
function openTimerSheet(preTask){
 const c=tCfg();
 const x=(T&&T.taskId&&S.tasks.find(k=>k.id===T.taskId))||(preTask&&S.tasks.find(k=>k.id===preTask))||null;

 h+='<div class="frx" id="tclock" style="text-align:center;font-size:58px;font-weight:700;letter-spacing:-1.5px;margin:6px 0">'+
  fmtClock(T?tRemain():c.f*60000)+'</div>';
 if(T){
  h+='<div class="row2"><button class="btn" data-act="'+(T.running?'tpause':'tresume')+'">'+(T.running?'Pause':'Resume')+'</button>'+
   '<button class="btn" data-act="tskip">Skip to '+(T.mode==='focus'?'break':'focus')+'</button></div>'+
   '<button class="btn dng" data-act="tstop">Stop timer</button>'+
   (T.pomos?'<div class="faint" style="text-align:center;margin-top:8px">'+T.pomos+' focus block'+(T.pomos>1?'s':'')+' this session</div>':'');
 }else{
  h+='<label style="text-align:center">Focus length</label>'+
   '<div class="chips" style="justify-content:center" id="tdur">'+
   [15,25,45,60,90].map(m=>'<button class="selchip'+(c.f===m?' on':'')+'" data-act="tdur" data-v="'+m+'">'+m+'m</button>').join('')+'</div>'+
   '<div class="faint" style="text-align:center;margin:8px 0 10px">Break '+c.b+' min · fine-tune both in More · time logs to the task automatically</div>'+
   '<button class="btn pri" data-act="tstartfocus" data-id="'+(preTask||'')+'">Start focus'+(x?'':' (no task)')+'</button>';
 }
 openSheet(h);
}

function cycle(id){
 const x=S.tasks.find(k=>k.id===id);if(!x)return;
 const order=['todo','doing','done'];
 const next=order[(order.indexOf(x.status)+1)%3];
 setStatus(x,next);
}
function markDone(id){const x=S.tasks.find(k=>k.id===id);if(x&&x.status!=='done')setStatus(x,'done')}
function setStatus(x,st){
 x.status=st;
 if(st==='done'){x.doneAt=new Date().toISOString();if(x.actual==null)x.actual=x.est}
 else{x.doneAt=null;x.actual=null}
 save();render();
 const row=document.querySelector('.view.on [data-id="'+x.id+'"]');
 if(row)row.classList.add('anim');
 if(st==='done')toastAct('Done · '+fmtH(x.actual)+' logged','Adjust',()=>openHours(x.id));
}

// ---- Google Drive backup ----
const DRIVE_NAME='roadmap90-backup.json';
let driveBusy=false;
async function driveFindId(tok){
 const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=drive&q="+
  encodeURIComponent("name='"+DRIVE_NAME+"' and trashed=false")+"&fields=files(id,modifiedTime)",
  {headers:{'Authorization':'Bearer '+tok}});
 if(!r.ok)throw new Error('drive '+r.status);
 const j=await r.json();return j.files&&j.files[0]?j.files[0].id:null;
}
function backupToDrive(silent){
 if(!S.settings.gclientId){if(!silent)toast('Set your Google Client ID first (Calendar tab)');return}
 if(driveBusy)return;driveBusy=true;
 gAuth(async tok=>{
  try{
   let id=S.settings.driveFileId;
   if(!id)id=await driveFindId(tok);
   const meta={name:DRIVE_NAME,mimeType:'application/json'};
   const body=JSON.stringify(S);
   const bnd='r90'+Math.floor(tRemain()+1)+'bndxx';
   const multipart='--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+
    JSON.stringify(meta)+'\r\n--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+bnd+'--';
   const url=id?('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=multipart')
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
   const r=await fetch(url,{method:id?'PATCH':'POST',
    headers:{'Authorization':'Bearer '+tok,'Content-Type':'multipart/related; boundary='+bnd},body:multipart});
   if(!r.ok)throw new Error('drive '+r.status);
   const j=await r.json();S.settings.driveFileId=j.id;S.settings.driveBackup=Date.now();save();
   if(!silent)toast('Backed up to Google Drive');else{const c=el('#drstat');if(c)renderMore()}
  }catch(e){if(!silent)toast(e.message==='auth'?'Sign in again':'Backup failed')}
  driveBusy=false;
 });
}
function restoreFromDrive(){
 if(!S.settings.gclientId){toast('Set your Google Client ID first (Calendar tab)');return}
 if(!confirm('Replace everything on THIS device with the Google Drive backup?'))return;
 gAuth(async tok=>{
  try{
   const id=S.settings.driveFileId||await driveFindId(tok);
   if(!id){toast('No backup found in Drive');return}
   const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{'Authorization':'Bearer '+tok}});
   if(!r.ok)throw new Error('drive '+r.status);
   const d=await r.json();
   if(!d||!Array.isArray(d.tasks))throw new Error('bad');
   S=d;if(!S.settings)S.settings={theme:'dark'};S.settings.driveFileId=id;
   migrate();ensureInstances();save();applyTheme();render();toast('Restored from Drive');
  }catch(e){toast(e.message==='auth'?'Sign in again':'Restore failed')}
 });
}

function attachGestures(root){
 root.querySelectorAll('.tk[data-id]').forEach(row=>{
  if(row.dataset.noswipe)return;
  let sx=0,sy=0,dx=0,drag=false;
  row.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;drag=true},{passive:true});
  row.addEventListener('touchmove',e=>{if(!drag)return;
   dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;
   if(Math.abs(dy)>34){drag=false;row.style.transform='';return}
   if(dx>0)row.style.transform='translateX('+Math.min(dx,110)+'px)'},{passive:true});
  row.addEventListener('touchend',()=>{
   if(drag&&dx>72){swiped=true;setTimeout(()=>swiped=false,400);markDone(row.dataset.id)}
   row.style.transform='';drag=false;dx=0});
 });
}

  const v=parseFloat(inp&&inp.value);if(isNaN(v)){toast('Enter a number');return}
  const k=d.kpis[ki];if(!k.h)k.h=[];
  const ex=k.h.find(e=>e.d===today());
  if(ex)ex.v=v;else k.h.push({d:today(),v});
  save();render();toast('KPI logged')}
 else if(act==='opendom'){curDom=+id;setView('domain')}
 else if(act==='backdoms')setView('domains');
 else if(act==='newdom')openDomainEditor(null);
 else if(act==='editdom')openDomainEditor(+id);
 else if(act==='savedom')saveDomain(id||null);
 else if(act==='deldom')delDomain(id);
 else if(act==='addms'){const due=el('#ms-due').value,txt=el('#ms-txt').value.trim();
  if(!due||!txt){toast('Date and text are both needed');return}
  const d=dom(curDom);if(!d.milestones)d.milestones=[];
  d.milestones.push({due,text:txt});d.milestones.sort((a,b)=>a.due<b.due?-1:1);
  save();render();toast('Milestone added')}
 else if(act==='delms'){const d=dom(curDom);
  if(!confirm('Remove this milestone?'))return;
  d.milestones.splice(+b.dataset.i,1);save();render();toast('Removed')}
 else if(act==='pickfocus')openFocusPicker();
 else if(act==='setfocus'){S.settings.focus={date:today(),id};save();closeSheet();render()}
 else if(act==='closesheet')closeSheet();
 else if(act==='hadj'){const x=S.tasks.find(k=>k.id===id);if(x){x.actual=Math.max(0,+((x.actual||0)+ +b.dataset.v).toFixed(2));save();const v=el('#hval');if(v)v.textContent=fmtH(x.actual)}}
 else if(act==='savetask')saveTask(id||null);
 else if(act==='deltask')delTask(id);
 else if(act==='gcal')window.open(gcalUrl(S.tasks.find(k=>k.id===id)),'_blank');
 else if(act==='ics')icsDownload(S.tasks.find(k=>k.id===id));
 else if(act==='addlog'){const t=el('#logtxt').value.trim();if(!t){toast('Write something first');return}
  S.logs.push({domain:curDom,date:today(),text:t});save();render();toast('Logged')}
 else if(act==='copyrep'){const txt=reportText();
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(()=>toast('Copied — paste to your coach'),()=>fallbackCopy(txt));
  else fallbackCopy(txt)}
 else if(act==='theme'){S.settings.theme=S.settings.theme==='light'?'dark':'light';save();applyTheme();render()}
 else if(act==='notif'){if(typeof Notification!=='undefined')Notification.requestPermission().then(()=>render())}
 else if(act==='drbackup')backupToDrive(false);
 else if(act==='drrestore')restoreFromDrive();
 else if(act==='export')doExport();
 else if(act==='import')el('#impfile').click();
});
document.addEventListener('keydown',e=>{
 if(e.key==='Enter'&&e.target&&e.target.id==='q-text'){e.preventDefault();quickSave()}
});
document.addEventListener('change',e=>{
 if(e.target.id==='impfile'&&e.target.files[0]){doImport(e.target.files[0]);e.target.value=''}
 else if(e.target.id==='capinp'){S.settings.dayCap=Math.max(0,+e.target.value||0);save();toast('Capacity saved')}
 else if(e.target.id==='gcidinp'){S.settings.gclientId=e.target.value.trim()||null;localStorage.removeItem('r90.gtok');gEvents=null;save();toast('Client ID saved')}
 else if(e.target.id==='fmin'){S.settings.focusMin=Math.max(1,+e.target.value||25);save();toast('Focus length saved')}
 else if(e.target.id==='bmin'){S.settings.breakMin=Math.max(1,+e.target.value||5);save();toast('Break length saved')}
});
document.querySelectorAll('#tabbar button').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.tab)));

load();
setView('today');
tRestore();
maybeAutoBackup();
setInterval(checkReminders,30000);
checkReminders();
setInterval(()=>{ensureInstances();save()},600000);
let lastMin=new Date().getMinutes();
setInterval(()=>{const m=new Date().getMinutes();
 if(m!==lastMin){lastMin=m;if(curView==='today'&&!el('#sheet').classList.contains('on'))renderToday()}},15000);
</script>
</body>
</html>
